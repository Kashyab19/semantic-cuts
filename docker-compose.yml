services:
  # --- APPLICATION ---
  inference:
    build: .
    image: semantic-cuts-app
    container_name: semantic_inference
    command: python3 -m app.server
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      - qdrant
      - redpanda
      - redis
    restart: always

  api:
    image: semantic-cuts-app
    container_name: semantic_api
    command: python3 -m app.main
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      - inference
      - redpanda
    restart: always

  manager:
    image: semantic-cuts-app
    container_name: semantic_manager
    command: python3 -m app.manager
    volumes:
      - .:/app
    environment:
      - KAFKA_BROKER=redpanda:9092
      - REDIS_HOST=redis
    depends_on:
      - inference
      - redpanda
      - redis
    restart: always

  worker:
    image: semantic-cuts-app
    container_name: semantic_worker
    command: python3 -m app.minion
    volumes:
      - .:/app
    environment:
      - KAFKA_BROKER=redpanda:9092
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - INFERENCE_API_URL=http://inference:8001/embed
    depends_on:
      - inference
      - manager
      - qdrant
    restart: always

  # --- INFRASTRUCTURE ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9094
    ports:
      - "9094:9094"
      - "8081:8081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  qdrant_data:
  redpanda_data:
